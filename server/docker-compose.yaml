# LatentSync inference API — GPU service.
#
# Port 8014: next free after wav2lip (8011), IndexTTS2 (8012), musetalk (8013).
#
# Model layout on host (${MODEL_DIR}/models/latentsync/, default /mnt/ai-models):
#   latentsync_unet.pt        main UNet checkpoint (~4.8 GB — LatentSync-1.6)
#   whisper/tiny.pt           Whisper tiny audio encoder (~73 MB)
#   insightface/              InsightFace face-detection weights
#                             (auto-downloaded by insightface lib on first run)
#
# Run via setup.sh (recommended):
#   DOCKER_PAT=xxx bash setup.sh
#
# Or manually:
#   docker compose -f server/docker-compose.yaml up -d
#   MODEL_DIR=/custom/path BASE_URL=http://1.2.3.4:8014 docker compose -f server/docker-compose.yaml up -d

services:
  latentsync:
    build:
      context: ..
      dockerfile: server/Dockerfile
    image: docker4zerocool/ai-latentsync:latest
    container_name: ai-latentsync
    restart: unless-stopped
    ports:
      - "8014:8014"
    environment:
      LATENTSYNC_CKPT_PATH:    /models/latentsync_unet.pt
      LATENTSYNC_WHISPER_PATH: /models/whisper/tiny.pt
      LATENTSYNC_CONFIG:       /app/latentsync/configs/unet/stage2_512.yaml
      LATENTSYNC_STEPS:        "20"
      LATENTSYNC_GUIDANCE:     "1.5"
      JOB_TTL_SECONDS:         "3600"
      BASE_URL:                "${BASE_URL:-https://mcp.baisoln.com/gpu-ai}"
      HF_HOME:                 /mnt/hf_cache
      LOG_LEVEL:               "info"

    volumes:
      - ${MODEL_DIR:-/mnt/ai-models}/models/latentsync:/models:ro
      - ${MODEL_DIR:-/mnt/ai-models}/models/latentsync/insightface:/root/.insightface
      - ${MODEL_DIR:-/mnt/ai-models}/models/hf_cache:/mnt/hf_cache
      - /etc/ssl/certs/ca-certificates.crt:/etc/ssl/certs/ca-certificates.crt:ro

    runtime: nvidia
    devices:
      - nvidia.com/gpu=all
